        function getVerseText(jsonData, book, chapter, verseRange) {
            const chapterData = jsonData[book][chapter];
            if (!chapterData) return "Chapter not found.";

            if (verseRange.includes('-')) {
                const [start, end] = verseRange.split('-').map(Number);
                let combinedText = [];

                for (let i = start; i <= end; i++) {
                    if (chapterData[i]) {
                        combinedText.push(chapterData[i]);
                    }
                }
                return combinedText.join(" ");
            } 
            
            return chapterData[verseRange] || "Verse not found.";
        }

        async function fetchRandomVerse() {
            try {
                const randomRef = favoriteVerses3[Math.floor(Math.random() * favoriteVerses3.length)];

                const match = randomRef.match(/(.+)\s(\d+):(\d+[-\d+]*)/);
                if (!match) throw new Error("Invalid reference format");

                const bookName = match[1].trim();
                const chapterNum = match[2];
                const verseRef = match[3];

                const response = await fetch(`NASB_books/${bookName}.json`);
                if (!response.ok) throw new Error(`File not found: ${bookName}.json`);
                const bookData = await response.json();

                const verseText = getVerseText(bookData, bookName, chapterNum, verseRef);

                document.getElementById('display-book').innerText = bookName;
                document.getElementById('display-chapter').innerText = chapterNum;
                document.getElementById('display-verse').innerText = verseRef;
                document.getElementById('display-text').innerText = `"${verseText}"`;

            } catch (error) {
                console.error("Selection Error:", error);
                document.getElementById('display-text').innerText = "Oops! Could not load the verse.";
            }
        }

        fetchRandomVerse();
