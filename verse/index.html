            "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon", "Hebrews", "James", 
            "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"
        ];

        async function fetchRandomVerse() {
            try {
                const randomRef = favoriteVerses[Math.floor(Math.random() * favoriteVerses.length)];

                const match = randomRef.match(/(.+)\s(\d+):(\d+)/);
                if (!match) throw new Error("Invalid reference format");

                const bookName = match[1];
                const chapterNum = match[2];
                const verseNum = match[3];

                const response = await fetch(`NASB_books/${bookName}.json`);
                if (!response.ok) throw new Error("File not found");
                const bookData = await response.json();

                const verseText = bookData[bookName][chapterNum][verseNum];

                document.getElementById('display-book').innerText = bookName;
                document.getElementById('display-chapter').innerText = chapterNum;
                document.getElementById('display-verse').innerText = verseNum;
                document.getElementById('display-text').innerText = `"${verseText}"`;

            } catch (error) {
                console.error("Selection Error:", error);
                document.getElementById('display-text').innerText = "Oops! Try that again.";
            }
        }

        fetchRandomVerse();
    </script>
