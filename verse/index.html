<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Verse</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preload" as="image" href="../assets/images/backgrounds/side.jpg">
</head>
<body>
    <div class="verse-info">

        <p>
            <p id="verse-text"></p>
            &nbsp;
            <span id="display-chapter"></span>
            :
            <span id="display-verse"></span>
        </p>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>

        const bibleBooks = [
            "Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth", 
            "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra", 
            "Nehemiah", "Esther", "Job", "Psalms", "Proverbs", "Ecclesiastes", "Song of Solomon", 
            "Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel", "Hosea", "Joel", "Amos", 
            "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah", 
            "Malachi", "Matthew", "Mark", "Luke", "John", "Acts", "Romans", "1 Corinthians", 
            "2 Corinthians", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thessalonians", 
            "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon", "Hebrews", "James", 
            "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"
        ];

        async function fetchRandomVerse() {
            try {
                const bookIndex = Math.floor(Math.random() * bibleBooks.length);
                const selectedBookName = bibleBooks[bookIndex];
                
                const fileResponse = await fetch(`NASB_books/${selectedBookName}.json`);
                if (!fileResponse.ok) throw new Error("File not found");
                const bookData = await fileResponse.json();

                const chapters = bookData[selectedBookName];
                const chapterKeys = Object.keys(chapters);
                const randomChapter = chapterKeys[Math.floor(Math.random() * chapterKeys.length)];
                
                const verses = chapters[randomChapter];
                const verseKeys = Object.keys(verses);
                const randomVerse = verseKeys[Math.floor(Math.random() * verseKeys.length)];
                
                const finalContent = verses[randomVerse];

                document.getElementById('display-book').innerText = selectedBookName;
                document.getElementById('display-chapter').innerText = randomChapter;
                document.getElementById('display-verse').innerText = randomVerse;
                document.getElementById('verse-text').innerText = `"${finalContent}"`;

            } catch (error) {
                console.error("Selection Error:", err);
                document.getElementById('verse-text').innerText = "Oops! Try that again.";
            }
        }

        fetchRandomVerse();
    </script>

</body>
</html>
