<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Verse</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preload" as="image" href="../assets/images/backgrounds/side.jpg">
</head>
<body>
    <div>
        <p id="number-display">Loading...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        async function fetchNumber() {
            try {
                const response = await fetch('https://www.randomnumberapi.com/api/v1.0/random?min=100&max=1000&count=1');
                const data = await response.json();
                document.getElementById('number-display').innerText = data[0];
            } catch (error) {
                document.getElementById('number-display').innerText = "Error loading number";
            }
        }

        fetchNumber();
    </script>

</body>
</html>
